<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalEye - Iridología Clínica MVP</title>
    <style>
        :root {
            --primary: #0056b3;
            --background: #f4f7f6;
            --surface: #ffffff;
            --text: #333333;
            --radius: 12px;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .container {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .camera-box {
            position: relative;
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
        }
        video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        canvas {
            display: none;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #004494;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #reportSection {
            display: none;
            background: #f8fbff;
            border-left: 4px solid var(--primary);
            padding: 1.5rem;
            border-radius: 0 var(--radius) var(--radius) 0;
            line-height: 1.6;
        }
        .loading {
            display: none;
            text-align: center;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>VitalEye Analytics</h1>
        <p>Sistema de Análisis Clínico Iridológico (MVP)</p>
    </header>

    <div class="container">
        <div class="camera-box">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvasElement"></canvas>
        </div>

        <div class="controls">
            <button id="startCamBtn">Activar Cámara</button>
            <button id="captureBtn" disabled>Capturar y Analizar Iris</button>
        </div>

        <div class="loading" id="loadingIndicator">Procesando terreno biológico y signos estructurales...</div>

        <div id="reportSection">
            <h3 style="margin-top: 0; color: var(--primary);">Reporte Clínico Teórico</h3>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Ingresa tu API Key de Google AI Studio aquí para el MVP local.
        // ADVERTENCIA: En producción, nunca expongas la API KEY en el frontend.
        const GEMINI_API_KEY = "TU_API_KEY_AQUI"; 
        
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const startCamBtn = document.getElementById('startCamBtn');
        const captureBtn = document.getElementById('captureBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const reportSection = document.getElementById('reportSection');
        const reportContent = document.getElementById('reportContent');

        let stream = null;

        // Iniciar Cámara
        startCamBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 } } 
                });
                video.srcObject = stream;
                captureBtn.disabled = false;
                startCamBtn.disabled = true;
            } catch (err) {
                alert("Error al acceder a la cámara: " + err.message);
            }
        });

        // Capturar Foto y llamar a la API
        captureBtn.addEventListener('click', async () => {
            if (!stream) return;

            // Preparar Canvas para la foto
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Extraer imagen en Base64 (remover el prefijo data:image/jpeg;base64,)
            const base64Image = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];

            // UI Updates
            loadingIndicator.style.display = 'block';
            reportSection.style.display = 'none';
            captureBtn.disabled = true;

            try {
                // Llamada REST a la API de Google Gemini (Gemini 1.5 Flash/Pro recomendado para imágenes)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Actúa como experto iridólogo siguiendo el protocolo clínico sistémico. Analiza esta imagen del iris, determina la densidad del estroma, e identifica posibles signos estructurales como lagunas, criptas o anillos de tensión. Genera el reporte estructurado." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }],
                        // Opcional: Aquí puedes agregar las 'system_instructions' en la API v1beta
                    })
                });

                if (!response.ok) throw new Error("Error en la conexión con AI Studio.");
                
                const data = await response.json();
                const textOutput = data.candidates[0].content.parts[0].text;
                
                // Mostrar resultados
                reportContent.innerHTML = textOutput.replace(/\n/g, '<br>');
                reportSection.style.display = 'block';

            } catch (error) {
                reportContent.innerHTML = `<span style="color:red;">Error en el análisis: Asegúrate de colocar tu API Key válida en el código. Detalles: ${error.message}</span>`;
                reportSection.style.display = 'block';
            } finally {
                loadingIndicator.style.display = 'none';
                captureBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
